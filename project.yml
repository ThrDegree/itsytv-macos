include:
  - path: project.local.yml
    required: false

name: itsytv
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.itsytv
  xcodeVersion: "26.0"
  attributes:
    LastUpgradeCheck: "2600"
    LastSwiftUpdateCheck: "2600"
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Debug-AppStore: debug
  Release: release
  Release-AppStore: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"

packages:
  ItsytvCore:
    path: ../itsytv-core

schemes:
  itsytv:
    build:
      targets:
        itsytv: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - itsytvTests
    archive:
      config: Release
  itsytv-appstore:
    build:
      targets:
        itsytv: all
    run:
      config: Debug-AppStore
    test:
      config: Debug-AppStore
    archive:
      config: Release-AppStore

targets:
  itsytvTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: itsytvTests
      - path: itsytv/Utilities/VersionComparator.swift
      - path: itsytv/Utilities/PlaybackMath.swift
      - path: itsytv/Utilities/HotkeyManager.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.itsytv.itsytvTests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEAD_CODE_STRIPPING: "YES"
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""

  itsytv:
    type: application
    platform: macOS
    sources:
      - path: itsytv
        excludes:
          - "**/*.proto"
          - itsytv.entitlements
          - itsytv-direct.entitlements
    settings:
      base:
        INFOPLIST_FILE: itsytv/Info.plist
        CODE_SIGN_ENTITLEMENTS: itsytv/itsytv.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.itsytv.app
        PRODUCT_NAME: Itsytv
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOLS: "YES"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
        MARKETING_VERSION: "1.6.0"
        CURRENT_PROJECT_VERSION: "160"
        ENABLE_HARDENED_RUNTIME: true
        DEAD_CODE_STRIPPING: "YES"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: itsytv/itsytv-direct.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: itsytv/itsytv-direct.entitlements
        Debug-AppStore:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
        Release-AppStore:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
    dependencies:
      - package: ItsytvCore
